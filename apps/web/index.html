<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link rel="icon" href="favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>DocuFlow AI</title>
    <meta name="title" content="DocuFlow AI" />
    <meta name="description" content="Serverless intelligent invoice and receipt processing platform on AWS." />

    <!-- Canonical URL for the DocuFlow AI frontend -->
    <link rel="canonical" href="https://docuflow-ai.local/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DocuFlow AI" />
    <meta property="og:title" content="DocuFlow AI" />
    <meta property="og:description" content="Serverless intelligent invoice and receipt processing platform on AWS." />
    <meta property="og:url" content="https://docuflow-ai.local/" />
    <!-- Use an absolute URL so scrapers can fetch the image reliably -->
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:alt" content="DocuFlow AI dashboard screenshot" />
    <!-- Optional: dimensions (leave generic if not exact) -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DocuFlow AI" />
    <meta name="twitter:description" content="Serverless intelligent invoice and receipt processing platform on AWS." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="DocuFlow AI dashboard screenshot" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
