name: Frontend CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build frontend
        run: pnpm --filter docuflow-ai-web build

  deploy-frontend:
    name: Deploy frontend
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH_NAME: ${{ vars.AMPLIFY_BRANCH_NAME }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
      VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
      VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
      VITE_BASENAME: ${{ vars.VITE_BASENAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate deployment variables
        run: |
          set -euo pipefail
          required=(
            AWS_REGION
            AWS_ROLE_TO_ASSUME
            AMPLIFY_APP_ID
            AMPLIFY_BRANCH_NAME
            VITE_API_BASE_URL
            VITE_COGNITO_REGION
            VITE_COGNITO_USER_POOL_ID
            VITE_COGNITO_CLIENT_ID
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for frontend deployment"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production frontend
        run: pnpm --filter docuflow-ai-web build

      - name: Package Amplify artifact
        run: |
          cd apps/web/dist
          zip -r "$GITHUB_WORKSPACE/frontend.zip" .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create Amplify deployment
        id: amplify-deployment
        run: |
          set -euo pipefail
          deployment_json="$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH_NAME")"
          echo "$deployment_json" > deployment.json
          job_id="$(jq -r '.jobId' deployment.json)"
          upload_url="$(jq -r '.zipUploadUrl' deployment.json)"

          if [ -z "$job_id" ] || [ "$job_id" = "null" ] || [ -z "$upload_url" ] || [ "$upload_url" = "null" ]; then
            echo "::error::Amplify did not return a valid jobId and zipUploadUrl"
            cat deployment.json
            exit 1
          fi

          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          echo "upload_url=$upload_url" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to Amplify
        run: |
          curl --fail --silent --show-error \
            -T "$GITHUB_WORKSPACE/frontend.zip" \
            "${{ steps.amplify-deployment.outputs.upload_url }}"

      - name: Start Amplify deployment
        run: |
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH_NAME" \
            --job-id "${{ steps.amplify-deployment.outputs.job_id }}"
