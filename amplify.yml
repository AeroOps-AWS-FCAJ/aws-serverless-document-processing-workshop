version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.12.0 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter docuflow-ai-web build
      artifacts:
        baseDirectory: apps/web/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
          - packages/*/node_modules/**/*
